<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex - Your Personal AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: #e4e4e7;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .orb {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }
        .orb.thinking { animation: pulse 0.6s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }
        .title { font-size: 1.1rem; font-weight: 600; }
        .status { margin-left: auto; font-size: 0.8rem; color: #6ee7b7; }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 85%;
            padding: 16px 20px;
            border-radius: 16px;
            line-height: 1.5;
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            align-self: flex-start;
            background: rgba(255,255,255,0.08);
            border-bottom-left-radius: 4px;
        }
        .message.system {
            align-self: center;
            background: rgba(251, 146, 60, 0.15);
            border: 1px solid rgba(251, 146, 60, 0.3);
            color: #fbbf24;
            font-size: 0.85rem;
            text-align: center;
        }

        /* Plan Display */
        .plan-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            margin-top: 12px;
            overflow: hidden;
        }
        .plan-header {
            padding: 16px;
            background: rgba(99, 102, 241, 0.15);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-weight: 600;
        }
        .plan-actions {
            max-height: 250px;
            overflow-y: auto;
        }
        .plan-action {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-size: 0.9rem;
        }
        .plan-action:last-child { border-bottom: none; }
        .plan-action input { margin-top: 3px; accent-color: #8b5cf6; }
        .plan-action-icon { font-size: 1.1rem; }
        .plan-action-text { flex: 1; }
        .plan-action-source { color: #e4e4e7; word-break: break-all; }
        .plan-action-dest { color: #6ee7b7; font-size: 0.85rem; margin-top: 2px; word-break: break-all; }
        .plan-action-reason { color: #94a3b8; font-size: 0.8rem; margin-top: 4px; }

        .plan-footer {
            padding: 16px;
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.2);
        }
        .btn {
            flex: 1;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .btn-approve {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        .btn-approve:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .btn-reject {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .btn-reject:hover { background: rgba(239, 68, 68, 0.25); }

        /* Suggestions */
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 24px 16px;
            justify-content: center;
        }
        .suggestion {
            padding: 10px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .suggestion:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.4);
        }

        /* Input Area */
        .input-area {
            padding: 20px 24px;
            border-top: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.2);
        }
        .input-container {
            display: flex;
            gap: 12px;
            max-width: 800px;
            margin: 0 auto;
        }
        .input-field {
            flex: 1;
            padding: 14px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            font-family: inherit;
        }
        .input-field:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
        }
        .input-field::placeholder { color: #64748b; }
        .send-btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .send-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Welcome State */
        .welcome {
            text-align: center;
            padding: 60px 24px;
        }
        .welcome-orb {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
            box-shadow: 0 0 60px rgba(139, 92, 246, 0.4);
            margin: 0 auto 24px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .welcome h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .welcome p { color: #94a3b8; margin-bottom: 32px; }

        /* Stats bar */
        .stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            font-size: 0.85rem;
            color: #94a3b8;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            margin-top: 12px;
            border-radius: 8px;
        }
        .stat-value { color: #fff; font-weight: 600; }
        
        /* Warnings */
        .warnings {
            margin-top: 8px;
            padding: 12px;
            background: rgba(251, 146, 60, 0.1);
            border-left: 3px solid #fb923c;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #fbbf24;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="orb" id="orb"></div>
        <span class="title">Apex</span>
        <span class="status" id="status">● Ready</span>
    </header>

    <main class="chat-container" id="chat">
        <div class="welcome" id="welcome">
            <div class="welcome-orb"></div>
            <h1>Hey! I'm Apex</h1>
            <p>Your personal AI assistant. Tell me what you need help with.</p>
        </div>
    </main>

    <div class="suggestions" id="suggestions">
        <span class="suggestion" onclick="sendMessage('My PC feels cluttered, can you help?')">🧹 My PC feels cluttered</span>
        <span class="suggestion" onclick="sendMessage('Find duplicate files wasting space')">🔍 Find duplicates</span>
        <span class="suggestion" onclick="sendMessage('Organize my Downloads folder')">📁 Organize Downloads</span>
        <span class="suggestion" onclick="sendMessage('What can you help me with?')">❓ What can you do?</span>
    </div>

    <footer class="input-area">
        <div class="input-container">
            <input type="text" class="input-field" id="input" 
                   placeholder="Tell me what you need..." 
                   onkeypress="if(event.key==='Enter')sendMessage()">
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </footer>

    <script>
        const API = 'http://localhost:8000';
        let currentTaskId = null;
        let currentPlan = null;

        function addMessage(text, type, extra = '') {
            document.getElementById('welcome')?.remove();
            const chat = document.getElementById('chat');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.innerHTML = text + extra;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
            return msg;
        }

        function setThinking(thinking) {
            document.getElementById('orb').classList.toggle('thinking', thinking);
            document.getElementById('status').textContent = thinking ? '● Thinking...' : '● Ready';
            document.querySelector('.send-btn').disabled = thinking;
        }

        function hideSuggestions() {
            document.getElementById('suggestions').style.display = 'none';
        }

        async function sendMessage(text) {
            const input = document.getElementById('input');
            const message = text || input.value.trim();
            if (!message) return;
            
            input.value = '';
            hideSuggestions();
            addMessage(message, 'user');
            setThinking(true);

            try {
                const res = await fetch(`${API}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await res.json();
                setThinking(false);

                if (data.error) {
                    addMessage(data.error, 'system');
                    return;
                }

                if (data.plan && data.plan.actions?.length > 0) {
                    currentTaskId = data.task_id;
                    currentPlan = data.plan;
                    addMessage(data.response, 'assistant', renderPlan(data.plan));
                } else {
                    addMessage(data.response, 'assistant');
                }

            } catch (e) {
                setThinking(false);
                addMessage('Cannot connect to Apex. Is the server running?', 'system');
            }
        }

        function renderPlan(plan) {
            const icons = { move: '📁', delete: '🗑️', create_folder: '📂', rename: '✏️' };
            
            let actionsHtml = '';
            if (plan.actions && plan.actions.length > 0) {
                actionsHtml = plan.actions.map((a, i) => `
                    <div class="plan-action">
                        <input type="checkbox" checked data-idx="${i}">
                        <span class="plan-action-icon">${icons[a.type] || '•'}</span>
                        <div class="plan-action-text">
                            <div class="plan-action-source">${a.source}</div>
                            ${a.destination ? `<div class="plan-action-dest">→ ${a.destination}</div>` : ''}
                            <div class="plan-action-reason">${a.reason}</div>
                        </div>
                    </div>
                `).join('');
            }
            
            let warningsHtml = '';
            if (plan.warnings && plan.warnings.length > 0) {
                warningsHtml = `<div class="warnings">⚠️ ${plan.warnings.join('<br>⚠️ ')}</div>`;
            }

            return `
                <div class="plan-card">
                    <div class="plan-header">📋 ${plan.summary}</div>
                    ${actionsHtml ? `<div class="plan-actions">${actionsHtml}</div>` : ''}
                    ${warningsHtml}
                    <div class="stats">
                        <span><span class="stat-value">${plan.stats?.files || 0}</span> files</span>
                        <span><span class="stat-value">${plan.stats?.space || '0 MB'}</span> to free</span>
                    </div>
                    <div class="plan-footer">
                        <button class="btn btn-reject" onclick="rejectPlan()">Cancel</button>
                        <button class="btn btn-approve" onclick="approvePlan()">✓ Do it</button>
                    </div>
                </div>
            `;
        }

        async function approvePlan() {
            const checkboxes = document.querySelectorAll('.plan-action input:checked');
            const indices = Array.from(checkboxes).map(cb => parseInt(cb.dataset.idx));
            
            if (indices.length === 0) {
                addMessage('Select at least one action to approve.', 'system');
                return;
            }

            setThinking(true);
            try {
                const res = await fetch(`${API}/approve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_id: currentTaskId, approved_indices: indices })
                });
                const data = await res.json();
                setThinking(false);

                const count = data.result?.success?.length || 0;
                addMessage(`Done! Completed ${count} actions. ${data.result?.space_freed ? `Freed ${data.result.space_freed}.` : ''}`, 'assistant');
                
            } catch (e) {
                setThinking(false);
                addMessage('Failed to execute. Try again?', 'system');
            }
        }

        function rejectPlan() {
            addMessage("No problem, I won't make any changes. What else can I help with?", 'assistant');
            currentTaskId = null;
            currentPlan = null;
        }

        // Focus input on load
        document.getElementById('input').focus();
    </script>
</body>
</html>
